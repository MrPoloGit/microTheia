DESIGN_NAME: chip_top

# Avalon 3.3V standard cell library (replaces default 5V gf180mcu_fd_sc_mcu7t5v0)
STD_CELL_LIBRARY: gf180mcu_as_sc_mcu7t3v3
STD_CELL_LIBRARY_OPT: gf180mcu_as_sc_mcu7t3v3

# GF180MCU IO pad fake sites — LibreLane 3.x reads flat variables, not the
# PAD_FAKE_SITES dict from gf180mcu_fd_io/config.tcl (which targets OpenLane 1.x).
# Values from libs.tech/librelane/gf180mcu_fd_io/config.tcl: GF_IO_Site=0.1x355,
# GF_COR_Site=355x355.
PAD_SITE_NAME: GF_IO_Site
PAD_CORNER_SITE_NAME: GF_COR_Site
PAD_FAKE_SITE_WIDTH: 0.1
PAD_FAKE_SITE_HEIGHT: 355
PAD_FAKE_CORNER_SITE_WIDTH: 355
PAD_FAKE_CORNER_SITE_HEIGHT: 355

# Provide merged GDS so KLayout XOR can check 3.3V std cell layouts
EXTRA_GDS:
    - pdk_dir::libs.ref/gf180mcu_as_sc_mcu7t3v3/gf180mcu_as_sc_mcu7t3v3__merged.gds

VERILOG_FILES:
    - dir::../src/chip_top.sv
    - dir::../src/chip_core.sv
    - dir::../src/soc.sv
    - dir::../src/spi_wrapper.sv
    - dir::../src/evt2_decoder.sv
    - dir::../src/input_fifo.sv
    - dir::../src/control_fsm.sv
    - dir::../src/voxel_binning.sv
    - dir::../src/voxel_bin_core.sv
    - dir::../src/voxel_mac_engine.sv
    - dir::../src/voxel_gesture_classifier.sv
    - dir::../src/selectable_debug.sv
    - dir::../src/gf180_sram_1r1w.sv
    - dir::../third_party/verilog_spi/spi_module.v
    - dir::../third_party/verilog_spi/spi2.v
    - dir::../third_party/verilog_spi/clock_divider.v
    - dir::../third_party/verilog_spi/pos_edge_det.v
    - dir::../third_party/verilog_spi/neg_edge_det.v

# Enable plugin for better SystemVerilog support
# USE_SLANG: True
# SLANG_ARGUMENTS: ['--keep-hierarchy']

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# SDC files
PNR_SDC_FILE: dir::chip_top.sdc
SIGNOFF_SDC_FILE: dir::chip_top.sdc
FALLBACK_SDC: dir::chip_top.sdc

# Power / ground nets
VDD_NETS:
    - VDD
GND_NETS:
    - VSS

# We need to add gf180mcu_fd_io__bi_24t
# due to the unused Y output for output only pads
IGNORE_DISCONNECTED_MODULES:
    - gf180mcu_fd_io__bi_24t
    - gf180mcu_ws_ip__id
    - gf180mcu_ws_ip__logo

# Clock
CLOCK_PORT: clk_PAD
CLOCK_NET: clk_pad/Y
CLOCK_PERIOD: 15.625 # 64 MHz need to add SPI clock in sdc file

# Fix hold violations
PL_RESIZER_HOLD_SLACK_MARGIN: 0.35
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.3

# Increase for more logic
# on your die
PL_TARGET_DENSITY_PCT: 35
GRT_ALLOW_CONGESTION: true

# Fix antenna violations after DRT
DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10 # %

# PDN - Straps
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75

# PDN - Core ring
PDN_CORE_RING: True
# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 25
PDN_CORE_RING_HWIDTH: 25
PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_ENABLE_PINS: False
PDN_CORE_VERTICAL_LAYER: Metal2
PDN_CORE_HORIZONTAL_LAYER: Metal3

# Due to OpenROAD bug
# https://github.com/The-OpenROAD-Project/OpenROAD/issues/8229
#PL_TIME_DRIVEN: False
#PL_ROUTABILITY_DRIVEN: False

# Do not error on magic DRC violations
# Note: Passing magic DRC is not required for the submission.
# However, it is recommended to fix or carefully review all violations.
ERROR_ON_MAGIC_DRC: False

# Prevent false positive DRC errors in I/O cells
MAGIC_GDS_FLATGLOB:
    # For contacts
    - "*_CDNS_*"
    # Foundry provided SRAMs
    - "*$$*"
    - "M1_N*"
    - "M1_P*"
    - "M2_M1*"
    - "M3_M2*"
    # nmos_5p0* / pmos_5p0* removed: those are 5V std cell internal subcells,
    # not present in the Avalon 3.3V library GDS.
    - "nmos_1p2*"
    - "pmos_1p2*"
    - "via1_*"
    - "ypass_gate*"
    - "G_ring_*"
# The following patterns were internal subcell names of the foundry 5V SRAM GDS
# (gf180mcu_fd_ip_sram). They are NOT needed for the OCD 3.3V SRAMs, which have
# a different internal layout. If Magic DRC reports false positives inside the
# OCD SRAM GDS cells, inspect the subcell names and add matching patterns here.
# - "dcap_103*" "din_*" "mux821_*" "rdummy_*" "pmoscap_*" "xdec_*"
# - "ypredec*" "xpredec*" "prexdec_*" "xdec8_*" "xdec16_*" "xdec32_*" "sa_*"

# Since we cannot meet the minimum density limit on Metal2,
# ignore active metal on previous and subsequent layers
# (DM.5_DM.7 and DM.4_DM.6). Dummy metal is moved to active
# metal during the precheck.
KLAYOUT_FILLER_OPTIONS:
    Metal2_ignore_active: true

# Because we have multiple power pads for one power domain
MAGIC_EXT_UNIQUE: notopports

MACROS:
    gf180mcu_ws_ip__id:
        gds:
            - dir::../ip/gf180mcu_ws_ip__id/gds/gf180mcu_ws_ip__id.gds
        lef:
            - dir::../ip/gf180mcu_ws_ip__id/lef/gf180mcu_ws_ip__id.lef
        vh:
            - dir::../ip/gf180mcu_ws_ip__id/vh/gf180mcu_ws_ip__id.v
        instances:
            chip_id:
                location: [26, 26]
                orientation: N

    gf180mcu_ws_ip__logo:
        gds:
            - dir::../ip/gf180mcu_ws_ip__logo/gds/gf180mcu_ws_ip__logo.gds
        lef:
            - dir::../ip/gf180mcu_ws_ip__logo/lef/gf180mcu_ws_ip__logo.lef
        vh:
            - dir::../ip/gf180mcu_ws_ip__logo/vh/gf180mcu_ws_ip__logo.v
        instances:
            wafer_space_logo:
                location:
                    [
                        "expr::$DIE_AREA[2] + -169.25",
                        "expr::$DIE_AREA[3] + -169.25",
                    ]
                orientation: N

    # OCD 3.3V SRAMs — gf180mcu_ocd_ip_sram repo (RTimothyEdwards)
    # Macro ports are identical to the 5V fd_ip_sram set; only the module
    # names and address widths differ.  Files land under:
    #   dependencies/pdks/gf180mcuD/libs.ref/gf180mcu_ocd_ip_sram/
    # after running: make clone-ocd-sram

    gf180mcu_ocd_ip_sram__sram256x8m8wm1:
        gds:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/gds/gf180mcu_ocd_ip_sram__sram256x8m8wm1.gds
        lef:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lef/gf180mcu_ocd_ip_sram__sram256x8m8wm1.lef
        vh:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/verilog/gf180mcu_ocd_ip_sram__sram256x8m8wm1.blackbox.v
        lib:
            # sram256x8 has a native TT corner — use it directly.
            "*_tt_025C_3v30":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram256x8m8wm1__tt_025C_3v30.lib
            "*_ff_n40C_3v60":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram256x8m8wm1__ff_n40C_3v60.lib
            "*_ss_125C_3v00":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram256x8m8wm1__ss_125C_3v00.lib
        instances:
            # input_fifo: 1 bank × 4 byte-lanes (col2, rows 0-3)
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[0].sel.u_sram":
                location: [2900, 600]
                orientation: N
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[1].sel.u_sram":
                location: [2900, 1000]
                orientation: N
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[2].sel.u_sram":
                location: [2900, 1400]
                orientation: N
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[3].sel.u_sram":
                location: [2900, 1800]
                orientation: N
            # thresh_ram: 1 bank × 5 byte-lanes (col2, rows 4-8)
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[0].sel.u_sram":
                location: [2900, 2200]
                orientation: N
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[1].sel.u_sram":
                location: [2900, 2600]
                orientation: N
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[2].sel.u_sram":
                location: [2900, 3000]
                orientation: N
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[3].sel.u_sram":
                location: [2900, 3400]
                orientation: N
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[4].sel.u_sram":
                location: [2900, 3800]
                orientation: N

    gf180mcu_ocd_ip_sram__sram512x8m8wm1:
        gds:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/gds/gf180mcu_ocd_ip_sram__sram512x8m8wm1.gds
        lef:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lef/gf180mcu_ocd_ip_sram__sram512x8m8wm1.lef
        vh:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/verilog/gf180mcu_ocd_ip_sram__sram512x8m8wm1.blackbox.v
        lib:
            # sram512x8 has no TT corner lib; use ff_n40C as a conservative substitute.
            "*_tt_025C_3v30":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram512x8m8wm1__ff_n40C_3v60.lib
            "*_ff_n40C_3v60":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram512x8m8wm1__ff_n40C_3v60.lib
            "*_ss_125C_3v00":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram512x8m8wm1__ss_125C_3v00.lib

    gf180mcu_ocd_ip_sram__sram1024x8m8wm1:
        gds:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/gds/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.gds
        lef:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lef/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.lef
        vh:
            - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/verilog/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.blackbox.v
        lib:
            # sram1024x8 has no TT corner lib; use ff_n40C as a conservative substitute.
            "*_tt_025C_3v30":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__ff_n40C_3v60.lib
            "*_ff_n40C_3v60":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__ff_n40C_3v60.lib
            "*_ss_125C_3v00":
                - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__ss_125C_3v00.lib
        instances:
            # weight_ram[0..3]: 4 RAMs × 2 banks — col0 (x=452) rows 0-7
            "i_chip_core.u_soc.u_core.gen_weight_ram[0].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [600, 500]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[0].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [600, 1050]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[1].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [600, 1600]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[1].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [600, 2150]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[2].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [1100, 500]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[2].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [1100, 1050]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[3].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [1100, 1600]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[3].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [1100, 2150]
                orientation: N
            # feature_ram: 2 banks × 2 byte-lanes — col1 (x=773.3) rows 0-3
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [1700, 2500]
                orientation: N
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[0].gen_byte[1].genblk1.sel.u_sram":
                location: [1700, 3050]
                orientation: N
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [1700, 3600]
                orientation: N
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[1].gen_byte[1].genblk1.sel.u_sram":
                location: [1700, 4150]
                orientation: N
            # counter_mem: 2 banks × 2 byte-lanes — col1 (x=773.3) rows 4-7
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [2300, 2500]
                orientation: N
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[0].gen_byte[1].genblk1.sel.u_sram":
                location: [2300, 3050]
                orientation: N
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [2300, 3600]
                orientation: N
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[1].gen_byte[1].genblk1.sel.u_sram":
                location: [2300, 4150]
                orientation: N
# Halo size around macros while cutting rows.
# Workaround for: https://github.com/The-OpenROAD-Project/OpenROAD/issues/8868
FP_MACRO_HORIZONTAL_HALO: 10
FP_MACRO_VERTICAL_HALO: 10
PDN_HORIZONTAL_HALO: 5
PDN_VERTICAL_HALO: 5

PDN_CFG: dir::pdn_cfg.tcl

# Make sure netgen doesn't create 'no_connect' nets
# Not needed since netgen 1.5.303
LVS_FLATTEN_CELLS:
    - gf180mcu_ws_ip__id
    - gf180mcu_ws_ip__logo

# gf180mcu_ws_ip__id/logo has no ports and components
# therefore make it an abstract cell in the layout
MAGIC_EXT_ABSTRACT_CELLS:
    - gf180mcu_ws_ip__id
    - gf180mcu_ws_ip__logo
