meta:
    version: 3
    flow: Chip
    substituting_steps:

DESIGN_NAME: chip_top

# # Avalon 3.3V standard cell library (replaces default 5V gf180mcu_fd_sc_mcu7t5v0)
# STD_CELL_LIBRARY: gf180mcu_as_sc_mcu7t3v3
# STD_CELL_LIBRARY_OPT: gf180mcu_as_sc_mcu7t3v3

# GF180MCU IO pad fake sites. Override here in case the PDK's
# libs.tech/librelane/gf180mcu_fd_io/config.tcl does not set PAD_FAKE_SITES.
# Values: GF_IO_Site = 0.1µm × 355µm, GF_COR_Site = 355µm × 355µm.
PAD_SITE_NAME: GF_IO_Site
PAD_CORNER_SITE_NAME: GF_COR_Site
PAD_FAKE_SITES:
    GF_IO_Site: [0.1, 355]
    GF_COR_Site: [355, 355]

# # Provide merged GDS so KLayout XOR can check 3.3V std cell layouts
# EXTRA_GDS:
#     - dir::../libs/gf180mcu_as_sc_mcu7t3v3/pdk/libs.ref/gf180mcu_as_sc_mcu7t3v3/gf180mcu_as_sc_mcu7t3v3__merged.gds

VERILOG_FILES:
    - dir::../src/chip_top.sv
    - dir::../src/chip_core.sv
    - dir::../src/soc.sv
    - dir::../src/spi_wrapper.sv
    - dir::../src/evt2_decoder.sv
    - dir::../src/input_fifo.sv
    - dir::../src/control_fsm.sv
    - dir::../src/voxel_binning.sv
    - dir::../src/voxel_bin_core.sv
    - dir::../src/voxel_mac_engine.sv
    - dir::../src/voxel_gesture_classifier.sv
    - dir::../src/selectable_debug.sv
    - dir::../src/sram_wrapper.sv
    - dir::../third_party/verilog_spi/spi_module.v
    - dir::../third_party/verilog_spi/spi2.v
    - dir::../third_party/verilog_spi/clock_divider.v
    - dir::../third_party/verilog_spi/pos_edge_det.v
    - dir::../third_party/verilog_spi/neg_edge_det.v

# Enable plugin for better SystemVerilog support
# USE_SLANG: True
# SLANG_ARGUMENTS: ['--keep-hierarchy']

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# SDC files
PNR_SDC_FILE: dir::chip_top.sdc
SIGNOFF_SDC_FILE: dir::chip_top.sdc
FALLBACK_SDC: dir::chip_top.sdc

# Power / ground nets
VDD_NETS:
    - VDD
GND_NETS:
    - VSS

# We need to add gf180mcu_fd_io__bi_24t
# due to the unused Y output for output only pads
IGNORE_DISCONNECTED_MODULES:
    - gf180mcu_fd_io__bi_24t
    - gf180mcu_ws_ip__id
    - gf180mcu_ws_ip__logo

# Skip every fill / tap / decap cell from the 3.3V SCL and IO libraries
# during LVS. The 3.3V flow inserts hundreds of thousands of fillcap_16
# / tap_2 cells; netgen's partition refinement does not converge in
# reasonable time at that scale. These cells connect only to power /
# ground rails, so dropping them does not affect LVS coverage.
# Requires librelane >= 3.0.0 (see flake.nix).
LVS_IGNORE_CELLS:
    # 3.3V standard-cell library
    - gf180mcu_as_sc_mcu7t3v3__fill_1
    - gf180mcu_as_sc_mcu7t3v3__fill_2
    - gf180mcu_as_sc_mcu7t3v3__fill_4
    - gf180mcu_as_sc_mcu7t3v3__fill_8
    - gf180mcu_as_sc_mcu7t3v3__fillcap_4
    - gf180mcu_as_sc_mcu7t3v3__fillcap_8
    - gf180mcu_as_sc_mcu7t3v3__fillcap_16
    - gf180mcu_as_sc_mcu7t3v3__tap_2
    # IO library fill cells
    - gf180mcu_fd_io__fill1
    - gf180mcu_fd_io__fill5
    - gf180mcu_fd_io__fill10
    - gf180mcu_fd_io__fillnc

# Clock
CLOCK_PORT: clk_PAD
CLOCK_NET: clk_pad/Y
CLOCK_PERIOD: 15.625 # 64 MHz, need to add SPI clock in sdc file for 32 MHz

# Fix hold violations
PL_RESIZER_HOLD_SLACK_MARGIN: 0.35
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.3

# Increase for more logic on your die
PL_TARGET_DENSITY_PCT: 35
GRT_ALLOW_CONGESTION: true

# Fix antenna violations after DRT
DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10 # %

# PDN - Straps
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75

# PDN - Core ring
PDN_CORE_RING: True
# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 25
PDN_CORE_RING_HWIDTH: 25
PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_ENABLE_PINS: True
PDN_CORE_VERTICAL_LAYER: Metal2
PDN_CORE_HORIZONTAL_LAYER: Metal3

# Due to OpenROAD bug
# https://github.com/The-OpenROAD-Project/OpenROAD/issues/8229
#PL_TIME_DRIVEN: False
#PL_ROUTABILITY_DRIVEN: False

# Do not error on magic DRC violations
# Note: Passing magic DRC is not required for the submission.
# However, it is recommended to fix or carefully review all violations.
ERROR_ON_MAGIC_DRC: False

# Prevent false positive DRC errors in I/O cells and SRAMs
MAGIC_GDS_FLATGLOB:
    # For contacts
    - "*_CDNS_*"
    # 3.3V SRAMs (based on foundry SRAM layout)
    - "*$$*"
    - "M1_N*"
    - "M1_P*"
    - "M2_M1*"
    - "M3_M2*"
    - "nmos_5p0*"
    - "nmos_1p2*"
    - "nmos_3p3*"
    - "pmos_5p0*"
    - "pmos_1p2*"
    - "pmos_3p3*"
    - "via1_*"
    - "ypass_gate*"
    - "G_ring_*"
    # SRAM internal cells that may contain DUALGATE layers
    - "dcap_103*"
    - "din_*"
    - "mux821_*"
    - "rdummy_*"
    - "pmoscap_*"
    - "xdec_*"
    - "ypredec*"
    - "xpredec*"
    - "prexdec_*"
    - "xdec8_*"
    - "xdec16_*"
    - "xdec32_*"
    - "sa_*"

# Since we cannot meet the minimum density limit on Metal2,
# ignore active metal on previous and subsequent layers
# (DM.5_DM.7 and DM.4_DM.6). Dummy metal is moved to active
# metal during the precheck.
KLAYOUT_FILLER_OPTIONS:
    Metal2_ignore_active: true

# Because we have multiple power pads for one power domain
MAGIC_EXT_UNIQUE: notopports

# # Make sure netgen doesn't create 'no_connect' nets
# # Not needed since netgen 1.5.303
# LVS_FLATTEN_CELLS:
#     - gf180mcu_ws_ip__id
#     - gf180mcu_ws_ip__logo

# # gf180mcu_ws_ip__id/logo has no ports and components
# # therefore make it an abstract cell in the layout
# MAGIC_EXT_ABSTRACT_CELLS:
#     - gf180mcu_ws_ip__id
#     - gf180mcu_ws_ip__logo

MACROS:
    gf180mcu_ws_ip__id:
        gds:
            - dir::../ip/gf180mcu_ws_ip__id/gds/gf180mcu_ws_ip__id.gds
        lef:
            - dir::../ip/gf180mcu_ws_ip__id/lef/gf180mcu_ws_ip__id.lef
        vh:
            - dir::../ip/gf180mcu_ws_ip__id/vh/gf180mcu_ws_ip__id.v
        lib:
            "*":
                - dir::../ip/gf180mcu_ws_ip__id/lib/gf180mcu_ws_ip__id.lib
        instances:
            chip_id:
                location: [26, 26]
                orientation: N

    gf180mcu_ws_ip__logo:
        gds:
            - dir::../ip/gf180mcu_ws_ip__logo/gds/gf180mcu_ws_ip__logo.gds
        lef:
            - dir::../ip/gf180mcu_ws_ip__logo/lef/gf180mcu_ws_ip__logo.lef
        vh:
            - dir::../ip/gf180mcu_ws_ip__logo/vh/gf180mcu_ws_ip__logo.v
        lib:
            "*":
                - dir::../ip/gf180mcu_ws_ip__logo/lib/gf180mcu_ws_ip__logo.lib
        instances:
            wafer_space_logo:
                location:
                    [
                        "expr::$DIE_AREA[2] + -169.25",
                        "expr::$DIE_AREA[3] + -169.25",
                    ]
                orientation: N

    gf180mcu_ocd_ip_sram__sram256x8m8wm1:
        gds:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1.gds
        lef:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1.lef
        vh:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1.blackbox.v
        lib:
            "*_tt_025C_3v30":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1__tt_025C_3v30.lib
            "*_ff_n40C_3v60":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1__ff_n40C_3v60.lib
            # "*_ss_125C_3v00":
            #     - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram256x8m8wm1__ss_125C_3v00.lib
        instances:
            # input_fifo: 1 bank × 4 byte-lanes
            # c2×2 block 
            # the 256x8 macro is about 301µm wide × 130µm tall in N/S orientation.
            # x pitch is 400µm so is aprox 99µm horizontal space between 
            # y pitch is 300µm so about 170µm vertical space between rows
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[0].sel.u_sram":
                location: [800, 3160]
                orientation: N
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[1].sel.u_sram":
                location: [1200, 3160]
                orientation: N
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[2].sel.u_sram":
                location: [800, 2860]
                orientation: S
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[3].sel.u_sram":
                location: [1200, 2860]
                orientation: S
            # thresh_ram: 1 bank × 5 byte-lanes
            # W/E that im using rotates the 256x8 macro so the footprint is roughly 130µm × 301µm
            # x pitch is 400µm giving plenty of horizontal room (expanded because was too dense)
            # y pitch is 400µm, giving about 99µm vertical clearance between the two rows.
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[0].sel.u_sram":
                location: [2400, 2200]
                orientation: W
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[1].sel.u_sram":
                location: [2800, 2200]
                orientation: E
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[2].sel.u_sram":
                location: [2400, 1800]
                orientation: W
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[3].sel.u_sram":
                location: [2800, 1800]
                orientation: E
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[4].sel.u_sram":
                location: [2550, 1500]
                orientation: S

    gf180mcu_ocd_ip_sram__sram512x8m8wm1:
        gds:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram512x8m8wm1/gf180mcu_ocd_ip_sram__sram512x8m8wm1.gds
        lef:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram512x8m8wm1/gf180mcu_ocd_ip_sram__sram512x8m8wm1.lef
        vh:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram512x8m8wm1/gf180mcu_ocd_ip_sram__sram512x8m8wm1.blackbox.v
        lib:
            "*_tt_025C_3v30":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram512x8m8wm1/gf180mcu_ocd_ip_sram__sram512x8m8wm1__tt_025C_3v30.lib
            "*_ff_n40C_3v60":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram512x8m8wm1/gf180mcu_ocd_ip_sram__sram512x8m8wm1__ff_n40C_3v60.lib
            # "*_ss_125C_3v00":
            #     - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram512x8m8wm1__ss_125C_3v00.lib

    gf180mcu_ocd_ip_sram__sram1024x8m8wm1:
        gds:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.gds
        lef:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.lef
        vh:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1.blackbox.v
        lib:
            "*_tt_025C_3v30":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__tt_025C_3v30.lib
            "*_ff_n40C_3v60":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram1024x8m8wm1/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__ff_n40C_3v60.lib
            # "*_ss_125C_3v00":
            #     - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram1024x8m8wm1__ss_125C_3v00.lib
        instances:
            # sram1024x8 is about 301µm wide × 535µm tall from the LEF pin extents. 
            #  top row is y=2040 with N orientation, bottom row is y=1500 with S orientation.
            # x pitch 400µm soabout 99µm horizontal space 
            # y pitch 540µm so about 5µm between 
            "i_chip_core.u_soc.u_core.gen_weight_ram[0].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [800, 2040]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[0].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [1200, 2040]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[1].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [1600, 2040]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[1].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [2000, 2040]
                orientation: N
            "i_chip_core.u_soc.u_core.gen_weight_ram[2].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [800, 1500]
                orientation: S
            "i_chip_core.u_soc.u_core.gen_weight_ram[2].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [1200, 1500]
                orientation: S
            "i_chip_core.u_soc.u_core.gen_weight_ram[3].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [1600, 1500]
                orientation: S
            "i_chip_core.u_soc.u_core.gen_weight_ram[3].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [2000, 1500]
                orientation: S
            # feature_ram 4 tiles arranged as a 2×2 block
            # top row is y=3400 with N orientation, bottom row is y=2860 with S orientation.
            # x pitch 400µm so about 99µm horizontal spacing.
            # y pitch 540µm (barely clears, works)
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [2400, 3400]
                orientation: N
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[0].gen_byte[1].genblk1.sel.u_sram":
                location: [2800, 3400]
                orientation: N
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [2400, 2860]
                orientation: S
            "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[1].gen_byte[1].genblk1.sel.u_sram":
                location: [2800, 2860]
                orientation: S
            # counter_mem 4 tiles arranged as a 2×2 block next to feature_ram
            # y=3400 for N and y=2860 for S.
            # x locations are 1600 and 2000, lines up with the feature_ram block
            # 400µm horizontal pitch and 540µm vertical pitch.
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[0].gen_byte[0].genblk1.sel.u_sram":
                location: [1600, 3400]
                orientation: N
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[0].gen_byte[1].genblk1.sel.u_sram":
                location: [2000, 3400]
                orientation: N
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[1].gen_byte[0].genblk1.sel.u_sram":
                location: [1600, 2860]
                orientation: S
            "i_chip_core.u_soc.u_core.u_voxel_binning.u_counter_mem.gen_bank[1].gen_byte[1].genblk1.sel.u_sram":
                location: [2000, 2860]
                orientation: S

# # This is an alternative method compared to
# # specifying the power connections in the RTL
# PDN_MACRO_CONNECTIONS:
#     # chip ID / logo IP blocks
#     - "chip_id VDD VSS VDD VSS"
#     - "wafer_space_logo VDD VSS VDD VSS"
#     # input_fifo: 4 × sram256x8
#     - "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[0].sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[1].sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[2].sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[3].sel.u_sram VDD VSS VDD VSS"
#     # thresh_ram: 5 × sram256x8
#     - "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[0].sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[1].sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[2].sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[3].sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[4].sel.u_sram VDD VSS VDD VSS"
#     # weight_ram[0..3]: 8 × sram1024x8 (col0)
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[0].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[0].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[1].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[1].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[2].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[2].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[3].u_weight_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.gen_weight_ram[3].u_weight_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     # feature_ram: 4 × sram1024x8 (col1)
#     - "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[0].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[0].gen_byte[1].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[1].gen_byte[0].genblk1.sel.u_sram VDD VSS VDD VSS"
#     - "i_chip_core.u_soc.u_core.u_feature_ram.gen_bank[1].gen_byte[1].genblk1.sel.u_sram VDD VSS VDD VSS"
#     # counter_mem: 4 × sram1024x8 (col1)
