        lib:
            "*":
                - dir::../ip/gf180mcu_ws_ip__logo/lib/gf180mcu_ws_ip__logo.lib
        instances:
            wafer_space_logo:
                location:
                    [
                        "expr::$DIE_AREA[2] + -169.25",
                        "expr::$DIE_AREA[3] + -169.25",
                    ]
                orientation: N

    gf180mcu_ocd_ip_sram__sram256x8m8wm1:
        gds:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1.gds
        lef:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1.lef
        vh:
            - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1.blackbox.v
        lib:
            "*_tt_025C_3v30":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1__tt_025C_3v30.lib
            "*_ff_n40C_3v60":
                - dir::../libs/gf180mcu_ocd_ip_sram/cells/gf180mcu_ocd_ip_sram__sram256x8m8wm1/gf180mcu_ocd_ip_sram__sram256x8m8wm1__ff_n40C_3v60.lib
            # "*_ss_125C_3v00":
            #     - pdk_dir::libs.ref/gf180mcu_ocd_ip_sram/lib/gf180mcu_ocd_ip_sram__sram256x8m8wm1__ss_125C_3v00.lib
        instances:
            # input_fifo: 1 bank × 4 byte-lanes
            # c2×2 block
            # the 256x8 macro is about 301µm wide × 130µm tall in N/S orientation.
            # x pitch is 400µm so is aprox 99µm horizontal space between
            # y pitch is 300µm so about 170µm vertical space between rows

            # moved input fifo cluster down by 115 µm to make room above
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[0].sel.u_sram":
                location: [800, 3015]
                orientation: N
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[1].sel.u_sram":
                location: [1200, 3015]
                orientation: N
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[2].sel.u_sram":
                location: [800, 2715] 
                orientation: S
            "i_chip_core.u_soc.u_core.u_input_fifo.u_fifo_mem.gen_bank[0].gen_byte[3].sel.u_sram":
                location: [1200, 2715]
                orientation: S
            # thresh_ram: 1 bank × 5 byte-lanes
            # W/E that im using rotates the 256x8 macro so the footprint is roughly 130µm × 301µm
            # x pitch is 400µm giving plenty of horizontal room (expanded because was too dense)
            # y pitch is 400µm, giving about 99µm vertical clearance between the two rows.
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[0].sel.u_sram":
                location: [2400, 2200]
                orientation: W
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[1].sel.u_sram":
                location: [2800, 2200]
                orientation: E
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[2].sel.u_sram":
                location: [2400, 1800]
                orientation: W
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[3].sel.u_sram":
                location: [2800, 1800]
                orientation: E
            "i_chip_core.u_soc.u_core.u_thresh_ram.gen_bank[0].gen_byte[4].sel.u_sram":
                location: [2550, 1500]
                orientation: S

    gf180mcu_ocd_ip_sram__sram512x8m8wm1:
